services:
  postgres:
    image: postgres:17-alpine
    container_name: protrader-postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: protrader
      POSTGRES_PASSWORD: protrader_local_dev
      POSTGRES_DB: protrader_sim
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U protrader -d protrader_sim"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: protrader-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes --requirepass protrader_redis_dev
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "protrader_redis_dev", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis-commander:
    image: rediscommander/redis-commander:latest
    container_name: protrader-redis-ui
    restart: unless-stopped
    ports:
      - "8081:8081"
    environment:
      REDIS_HOSTS: "local:redis:6379:0:protrader_redis_dev"
    depends_on:
      redis:
        condition: service_healthy

  mailhog:
    image: mailhog/mailhog:latest
    container_name: protrader-mailhog
    restart: unless-stopped
    ports:
      - "1025:1025"  # SMTP
      - "8025:8025"  # Web UI
    logging:
      driver: "none"

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
